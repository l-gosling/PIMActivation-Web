services:
  pim-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pim-activation-web
    ports:
      - "${HTTPS_PORT:-443}:8080"
    environment:
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-your-tenant-id}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-your-client-id}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-your-client-secret}
      - ENTRA_REDIRECT_URI=${ENTRA_REDIRECT_URI:-https://localhost/api/auth/callback}
      - PODE_PORT=8080
      - PODE_MODE=${PODE_MODE:-production}
      - PODE_CERT_PATH=/etc/pim-certs/cert.pem
      - PODE_CERT_KEY_PATH=/etc/pim-certs/key.pem
      - LOG_LEVEL=${LOG_LEVEL:-Information}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      - INCLUDE_ENTRA_ROLES=${INCLUDE_ENTRA_ROLES:-true}
      - INCLUDE_GROUPS=${INCLUDE_GROUPS:-true}
      - INCLUDE_AZURE_RESOURCES=${INCLUDE_AZURE_RESOURCES:-false}
      - THEME_PRIMARY_COLOR=${THEME_PRIMARY_COLOR:-#0078D4}
      - THEME_SECONDARY_COLOR=${THEME_SECONDARY_COLOR:-#107C10}
      - THEME_DANGER_COLOR=${THEME_DANGER_COLOR:-#DA3B01}
      - THEME_WARNING_COLOR=${THEME_WARNING_COLOR:-#FFB900}
      - THEME_SUCCESS_COLOR=${THEME_SUCCESS_COLOR:-#107C10}
      - THEME_FONT_FAMILY=${THEME_FONT_FAMILY:-Segoe UI, -apple-system, sans-serif}
      - THEME_SECTION_HEADER_COLOR=${THEME_SECTION_HEADER_COLOR:-}
      - THEME_ENTRA_COLOR=${THEME_ENTRA_COLOR:-#0078D4}
      - THEME_GROUP_COLOR=${THEME_GROUP_COLOR:-#107C10}
      - THEME_AZURE_COLOR=${THEME_AZURE_COLOR:-#003067}
      - APP_COPYRIGHT=${APP_COPYRIGHT:-}
    volumes:
      - ./config:/etc/pim-config:ro
      - ./certs:/etc/pim-certs:ro
      - pim-data:/var/pim-data
      - ./logs:/var/log/pim:rw
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - pim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pim-data:
    driver: local

networks:
  pim-network:
    driver: bridge
