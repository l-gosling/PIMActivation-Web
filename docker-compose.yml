services:
  pim-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pim-activation-web
    ports:
      - "${HTTPS_PORT:-443}:8080"
    environment:
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-your-tenant-id}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-your-client-id}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-your-client-secret}
      - ENTRA_REDIRECT_URI=${ENTRA_REDIRECT_URI:-https://localhost/api/auth/callback}
      - PODE_PORT=8080
      - PODE_MODE=${PODE_MODE:-production}
      - PODE_CERT_PATH=/etc/pim-certs/cert.pem
      - PODE_CERT_KEY_PATH=/etc/pim-certs/key.pem
      - LOG_LEVEL=${LOG_LEVEL:-Information}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      - INCLUDE_ENTRA_ROLES=${INCLUDE_ENTRA_ROLES:-true}
      - INCLUDE_GROUPS=${INCLUDE_GROUPS:-true}
      - INCLUDE_AZURE_RESOURCES=${INCLUDE_AZURE_RESOURCES:-false}
    volumes:
      - ./config:/etc/pim-config:ro
      - ./certs:/etc/pim-certs:ro
      - pim-data:/var/pim-data
      - ./logs:/var/log/pim:rw
    networks:
      - pim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pim-data:
    driver: local

networks:
  pim-network:
    driver: bridge
